<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Full bleed background (maskable — safe zone is inner 80%) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#shine)"/>

  <!-- Safe zone content (within ~205-307 center 40%) — slightly smaller car -->
  <!-- Car body -->
  <rect x="102" y="300" width="308" height="76" rx="16" fill="white"/>

  <!-- Cabin -->
  <path d="M178 300 L212 234 L300 234 L334 300 Z" fill="white"/>

  <!-- Windows -->
  <path d="M194 290 L218 244 L252 244 L252 290 Z" fill="#1e3a8a" opacity="0.65"/>
  <path d="M260 290 L260 244 L294 244 L318 290 Z" fill="#1e3a8a" opacity="0.65"/>

  <!-- Front wheel -->
  <circle cx="186" cy="376" r="44" fill="#1e3a8a" stroke="white" stroke-width="9"/>
  <circle cx="186" cy="376" r="18" fill="white" opacity="0.25"/>

  <!-- Rear wheel -->
  <circle cx="326" cy="376" r="44" fill="#1e3a8a" stroke="white" stroke-width="9"/>
  <circle cx="326" cy="376" r="18" fill="white" opacity="0.25"/>

  <!-- Headlight -->
  <rect x="106" y="310" width="36" height="14" rx="5" fill="#93c5fd"/>
  <!-- Taillight -->
  <rect x="370" y="310" width="36" height="14" rx="5" fill="#fca5a5"/>
</svg>
