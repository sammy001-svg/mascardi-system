<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.15)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" fill="url(#shine)"/>

  <!-- Car body -->
  <rect x="72" y="286" width="368" height="90" rx="18" fill="white"/>

  <!-- Car cabin/roof -->
  <path d="M158 286 L196 210 L316 210 L354 286 Z" fill="white"/>

  <!-- Window left -->
  <path d="M175 276 L206 222 L248 222 L248 276 Z" fill="#1e3a8a" opacity="0.65"/>
  <!-- Window right -->
  <path d="M264 276 L264 222 L306 222 L337 276 Z" fill="#1e3a8a" opacity="0.65"/>
  <!-- Window divider -->
  <rect x="252" y="222" width="12" height="54" fill="white" opacity="0.25"/>

  <!-- Front bumper extension -->
  <rect x="72" y="340" width="60" height="36" rx="10" fill="white" opacity="0.85"/>
  <!-- Rear bumper extension -->
  <rect x="380" y="340" width="60" height="36" rx="10" fill="white" opacity="0.85"/>

  <!-- Front wheel -->
  <circle cx="175" cy="376" r="50" fill="#1e3a8a" stroke="white" stroke-width="10"/>
  <circle cx="175" cy="376" r="22" fill="white" opacity="0.25"/>
  <circle cx="175" cy="376" r="8" fill="white" opacity="0.5"/>

  <!-- Rear wheel -->
  <circle cx="337" cy="376" r="50" fill="#1e3a8a" stroke="white" stroke-width="10"/>
  <circle cx="337" cy="376" r="22" fill="white" opacity="0.25"/>
  <circle cx="337" cy="376" r="8" fill="white" opacity="0.5"/>

  <!-- Headlight -->
  <rect x="76" y="296" width="44" height="18" rx="6" fill="#93c5fd"/>
  <rect x="76" y="296" width="44" height="18" rx="6" fill="url(#shine)"/>

  <!-- Taillight -->
  <rect x="392" y="296" width="44" height="18" rx="6" fill="#fca5a5"/>

  <!-- Door line -->
  <line x1="256" y1="286" x2="256" y2="376" stroke="#3b82f6" stroke-width="3" opacity="0.4"/>

  <!-- Grill lines -->
  <rect x="98" y="316" width="22" height="4" rx="2" fill="#93c5fd" opacity="0.8"/>
  <rect x="98" y="324" width="22" height="4" rx="2" fill="#93c5fd" opacity="0.6"/>
  <rect x="98" y="332" width="22" height="4" rx="2" fill="#93c5fd" opacity="0.4"/>
</svg>
